[graph]
all-features = true
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-gnu",
    "aarch64-linux-android",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "aarch64-pc-windows-msvc",
]

[licenses]
# Dependencies are denied unless at least one branch of their SPDX expression
# can be satisfied by this reviewed list. Keep reciprocal licenses scoped to
# named exceptions instead of making them globally acceptable.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8
include-build = true
include-dev = false
unused-allowed-license = "allow"
exceptions = [
    # Bifrost itself is the LGPL-covered work, not a generally allowed
    # third-party dependency.
    { crate = "brokk-bifrost", allow = ["LGPL-3.0-or-later"] },
    # Only the optional nlp feature reaches this MPL crate through hf-hub.
    # Any prebuilt nlp artifact must also inform recipients how to obtain the
    # option-ext source, as documented on the public third-party-notices page.
    { crate = "option-ext@0.2.0", allow = ["MPL-2.0"] },
]

[licenses.private]
ignore = false
