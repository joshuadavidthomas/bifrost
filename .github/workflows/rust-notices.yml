name: Rust notices

on:
  workflow_call:
    inputs:
      ref:
        description: Validated release tag to check out
        required: true
        type: string

jobs:
  notices:
    name: generate Rust notices
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Install pinned cargo-about
        run: cargo install --locked cargo-about --version 0.9.1 --features cli

      - name: Fetch locked dependencies for offline notice report
        run: cargo fetch --locked

      - name: Generate Rust notice report
        run: scripts/generate-rust-third-party-notices.sh dist/THIRD_PARTY_LICENSES.html

      - name: Upload Rust notice report
        uses: actions/upload-artifact@v6
        with:
          name: rust-third-party-licenses
          path: dist/THIRD_PARTY_LICENSES.html
          if-no-files-found: error
