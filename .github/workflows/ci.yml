name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --check

  rust:
    name: rust (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
      ANDROID_API: '21'
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            can-test: true
            rustflags: ''
            test-args: '--jobs 1'
            cargo-flags: '--features nlp'
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            can-test: true
            rustflags: '-C target-feature=+fullfp16'
            test-args: '--jobs 1'
            cargo-flags: '--features nlp'
          - target: aarch64-apple-darwin
            runner: macos-latest
            can-test: true
            rustflags: '-C link-arg=-undefined -C link-arg=dynamic_lookup'
            test-args: ''
            cargo-flags: '--features nlp'
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            can-test: true
            rustflags: ''
            test-args: ''
            cargo-flags: '--features nlp'
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            can-test: false
            rustflags: ''
            test-args: ''
            cargo-flags: '--features nlp'
          - target: aarch64-linux-android
            runner: ubuntu-latest
            can-test: false
            rustflags: ''
            test-args: ''
            cargo-flags: ''
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Android NDK
        if: matrix.target == 'aarch64-linux-android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
          add-to-path: false

      - name: Configure Android toolchain
        if: matrix.target == 'aarch64-linux-android'
        shell: bash
        run: |
          toolchain_bin="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          api="${ANDROID_API}"
          {
            echo "CC_aarch64_linux_android=${toolchain_bin}/aarch64-linux-android${api}-clang"
            echo "CXX_aarch64_linux_android=${toolchain_bin}/aarch64-linux-android${api}-clang++"
            echo "AR_aarch64_linux_android=${toolchain_bin}/llvm-ar"
            echo "RANLIB_aarch64_linux_android=${toolchain_bin}/llvm-ranlib"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${toolchain_bin}/aarch64-linux-android${api}-clang"
          } >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: clippy
          targets: ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: cargo clippy
        run: cargo clippy --all-targets ${{ matrix.cargo-flags }} --target ${{ matrix.target }} -- -D warnings

      - name: cargo test
        if: matrix.can-test
        run: cargo test --target ${{ matrix.target }} ${{ matrix.cargo-flags }} ${{ matrix.test-args }}

  python:
    name: python (${{ matrix.target }})
    needs: rust
    runs-on: ${{ matrix.runner }}
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            rustflags: ''
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            rustflags: ''
          - target: aarch64-apple-darwin
            runner: macos-latest
            rustflags: '-C link-arg=-undefined -C link-arg=dynamic_lookup'
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            rustflags: ''
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: python-${{ matrix.target }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'

      - name: Run python tests
        run: bash scripts/test_python.sh
