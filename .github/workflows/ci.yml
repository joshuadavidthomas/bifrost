name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  licenses:
    name: dependency licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pinned license tools
        run: |
          cargo install --locked cargo-about --version 0.9.1 --features cli
          cargo install --locked cargo-deny --version 0.20.2

      - name: Check all-feature license policy
        run: cargo deny --config licenses/deny.toml --locked check licenses

      - name: Check shipped Rust notice report
        run: |
          cargo about generate --offline --config licenses/about.toml --features python --locked --fail licenses/about.hbs -o /tmp/THIRD_PARTY_LICENSES.html
          cmp licenses/THIRD_PARTY_LICENSES.html /tmp/THIRD_PARTY_LICENSES.html
          node scripts/generate-supplemental-third-party-notices.mjs /tmp/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt
          cmp licenses/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt /tmp/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --check

  csharp-external-fixture:
    name: C# external fixture provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.418
      - name: Rebuild and verify managed fixture
        run: bash scripts/verify-csharp-external-fixture.sh

  vscode:
    name: vscode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: editors/vscode

      - name: Check extension
        run: npm test
        working-directory: editors/vscode

      - name: Package and inspect extension notices
        shell: bash
        working-directory: editors/vscode
        run: |
          npx --no-install vsce package --out /tmp/bifrost-ci.vsix
          unzip -Z1 /tmp/bifrost-ci.vsix > /tmp/bifrost-vsix-files.txt
          grep -Fx 'extension/LICENSE.md' /tmp/bifrost-vsix-files.txt
          grep -Fx 'extension/GPL-3.0.md' /tmp/bifrost-vsix-files.txt
          grep -Fx 'extension/SOURCE.md' /tmp/bifrost-vsix-files.txt
          grep -Fx 'extension/THIRD_PARTY_LICENSES.txt' /tmp/bifrost-vsix-files.txt

  rust:
    name: rust (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
      ANDROID_API: '21'
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            can-test: true
            rustflags: ''
            test-args: '--jobs 1'
            cargo-flags: '--features nlp'
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            can-test: true
            rustflags: ''
            test-args: ''
            cargo-flags: '--features nlp'
          - target: aarch64-apple-darwin
            runner: macos-latest
            can-test: true
            rustflags: '-C link-arg=-undefined -C link-arg=dynamic_lookup'
            test-args: ''
            cargo-flags: '--features nlp'
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            can-test: true
            rustflags: ''
            test-args: ''
            cargo-flags: '--features nlp'
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            can-test: false
            rustflags: ''
            test-args: ''
            cargo-flags: '--features nlp'
          - target: aarch64-linux-android
            runner: ubuntu-latest
            can-test: false
            rustflags: ''
            test-args: ''
            cargo-flags: ''
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android NDK
        if: matrix.target == 'aarch64-linux-android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
          add-to-path: false

      - name: Configure Android toolchain
        if: matrix.target == 'aarch64-linux-android'
        shell: bash
        run: |
          toolchain_bin="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          api="${ANDROID_API}"
          {
            echo "CC_aarch64_linux_android=${toolchain_bin}/aarch64-linux-android${api}-clang"
            echo "CXX_aarch64_linux_android=${toolchain_bin}/aarch64-linux-android${api}-clang++"
            echo "AR_aarch64_linux_android=${toolchain_bin}/llvm-ar"
            echo "RANLIB_aarch64_linux_android=${toolchain_bin}/llvm-ranlib"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${toolchain_bin}/aarch64-linux-android${api}-clang"
          } >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: clippy
          targets: ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: cargo clippy
        run: cargo clippy --all-targets ${{ matrix.cargo-flags }} --target ${{ matrix.target }} -- -D warnings

      - name: Install uv
        if: matrix.can-test
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: false

      - name: cargo test
        if: matrix.can-test
        run: cargo test --target ${{ matrix.target }} ${{ matrix.cargo-flags }} ${{ matrix.test-args }}

  python:
    name: python (${{ matrix.target }})
    needs: rust
    runs-on: ${{ matrix.runner }}
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            rustflags: ''
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            rustflags: ''
          - target: aarch64-apple-darwin
            runner: macos-latest
            rustflags: '-C link-arg=-undefined -C link-arg=dynamic_lookup'
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            rustflags: ''
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: python-${{ matrix.target }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'

      - name: Run python tests
        run: bash scripts/test_python.sh
