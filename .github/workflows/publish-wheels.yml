name: Publish wheels

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g. v0.6.4). Must already exist.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-context:
    name: validate release context
    uses: ./.github/workflows/release-context.yml
    with:
      tag: ${{ inputs.tag || github.ref_name }}
    permissions:
      contents: read

  notices:
    name: generate Rust notices
    needs: release-context
    uses: ./.github/workflows/rust-notices.yml
    with:
      ref: ${{ needs.release-context.outputs.tag }}
    permissions:
      contents: read

  build:
    name: build (${{ matrix.target }})
    needs: [release-context, notices]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            kind: linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            kind: linux
          - target: x86_64-apple-darwin
            # macos-latest is arm64; build the x86_64 wheel natively on the last
            # Intel image. macos-13 was retired (Dec 2025); macos-15-intel is the
            # final native x86_64 macOS runner, available until ~Aug 2027. After
            # that, cross-compile this target from an arm64 runner instead.
            runner: macos-15-intel
            kind: macos
          - target: aarch64-apple-darwin
            runner: macos-latest
            kind: macos
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            kind: windows
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-context.outputs.tag }}

      - name: Download Rust notice report
        uses: actions/download-artifact@v7
        with:
          name: rust-third-party-licenses
          path: licenses

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # manylinux2014 only applies on Linux; ignored elsewhere.
          manylinux: ${{ matrix.kind == 'linux' && '2014' || 'auto' }}
          args: --release --locked --out dist
          # Pin Rust to match the rest of the repo's workflows (rust-toolchain.toml is 1.96.0).
          rust-toolchain: '1.96.0'

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: build sdist
    needs: [release-context, notices]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.release-context.outputs.tag }}

      - name: Download Rust notice report
        uses: actions/download-artifact@v7
        with:
          name: rust-third-party-licenses
          path: licenses

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: publish to PyPI
    needs: [release-context, build, sdist]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download source distribution
        uses: actions/download-artifact@v7
        with:
          name: sdist
          path: dist

      - name: Verify built artifacts carry the tagged version
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.release-context.outputs.version }}
        run: |
          # Last line of defence: confirm every wheel/sdist about to hit PyPI
          # actually carries the tagged version, whatever maturin resolved.
          shopt -s nullglob
          artifacts=(dist/*.whl dist/*.tar.gz)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No artifacts found in dist/" >&2
            exit 1
          fi
          bad=0
          for f in "${artifacts[@]}"; do
            case "$(basename "$f")" in
              *-"${EXPECTED_VERSION}"-*|*-"${EXPECTED_VERSION}".tar.gz) ;;
              *) echo "Artifact $(basename "$f") does not carry version $EXPECTED_VERSION" >&2; bad=1 ;;
            esac
          done
          [ "$bad" -eq 0 ] || exit 1
          echo "All ${#artifacts[@]} artifacts carry version $EXPECTED_VERSION"

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
