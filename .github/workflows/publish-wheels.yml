name: Publish wheels

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g. v0.6.4). Must already exist.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  notices:
    name: generate Rust notices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Install pinned cargo-about
        run: cargo install --locked cargo-about --version 0.9.1 --features cli

      - name: Generate Rust notice report
        run: scripts/generate-rust-third-party-notices.sh dist/THIRD_PARTY_LICENSES.html

      - name: Upload Rust notice report
        uses: actions/upload-artifact@v6
        with:
          name: rust-third-party-licenses
          path: dist/THIRD_PARTY_LICENSES.html
          if-no-files-found: error

  verify-version:
    name: verify version matches tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Verify version is in sync (tag == Cargo.toml, pyproject inherits)
        shell: bash
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          tag_version="${TAG#v}"
          # Cargo.toml is the single source of truth; the wheel inherits it via
          # maturin's dynamic version.
          crate_version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          if [ "$tag_version" != "$crate_version" ]; then
            echo "Tag version $tag_version != Cargo.toml $crate_version" >&2
            exit 1
          fi
          # Guard the single-source invariant: pyproject must NOT hardcode a
          # version (it would silently override Cargo.toml and re-introduce drift).
          if grep -qE '^version *=' pyproject.toml; then
            echo "pyproject.toml declares a hardcoded version; it must use dynamic = [\"version\"]" >&2
            exit 1
          fi
          echo "Version $crate_version matches tag $TAG (pyproject inherits via maturin)"

  build:
    name: build (${{ matrix.target }})
    needs: [verify-version, notices]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            kind: linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            kind: linux
          - target: x86_64-apple-darwin
            # macos-latest is arm64; build the x86_64 wheel natively on the last
            # Intel image. macos-13 was retired (Dec 2025); macos-15-intel is the
            # final native x86_64 macOS runner, available until ~Aug 2027. After
            # that, cross-compile this target from an arm64 runner instead.
            runner: macos-15-intel
            kind: macos
          - target: aarch64-apple-darwin
            runner: macos-latest
            kind: macos
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            kind: windows
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download Rust notice report
        uses: actions/download-artifact@v7
        with:
          name: rust-third-party-licenses
          path: licenses

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # manylinux2014 only applies on Linux; ignored elsewhere.
          manylinux: ${{ matrix.kind == 'linux' && '2014' || 'auto' }}
          args: --release --locked --out dist
          # Pin Rust to match the rest of the repo's workflows (rust-toolchain.toml is 1.96.0).
          rust-toolchain: '1.96.0'

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: build sdist
    needs: [verify-version, notices]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download Rust notice report
        uses: actions/download-artifact@v7
        with:
          name: rust-third-party-licenses
          path: licenses

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: publish to PyPI
    needs: [verify-version, build, sdist]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download source distribution
        uses: actions/download-artifact@v7
        with:
          name: sdist
          path: dist

      - name: Verify built artifacts carry the tagged version
        shell: bash
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          # Last line of defence: confirm every wheel/sdist about to hit PyPI
          # actually carries the tagged version, whatever maturin resolved.
          expected="${TAG#v}"
          shopt -s nullglob
          artifacts=(dist/*.whl dist/*.tar.gz)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No artifacts found in dist/" >&2
            exit 1
          fi
          bad=0
          for f in "${artifacts[@]}"; do
            case "$(basename "$f")" in
              *-"${expected}"-*|*-"${expected}".tar.gz) ;;
              *) echo "Artifact $(basename "$f") does not carry version $expected" >&2; bad=1 ;;
            esac
          done
          [ "$bad" -eq 0 ] || exit 1
          echo "All ${#artifacts[@]} artifacts carry version $expected"

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
