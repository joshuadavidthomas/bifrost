name: Release context

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag or fully qualified tag ref to validate
        required: true
        type: string
    outputs:
      tag:
        description: Normalized v-prefixed release tag
        value: ${{ jobs.validate.outputs.tag }}
      version:
        description: Validated Cargo package version
        value: ${{ jobs.validate.outputs.version }}

jobs:
  validate:
    name: validate release context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate release version and metadata
        id: release
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: >
          node scripts/release-version.mjs check
          --tag "$RELEASE_TAG"
          --github-output "$GITHUB_OUTPUT"
