name: Benchmark

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:
    inputs:
      repo:
        description: 'Optional repo name from benchmark/targets.toml'
        required: false
        type: string
      max_files:
        description: 'Optional subset limit for manual smoke runs'
        required: false
        type: string
      strict_compare:
        description: 'Fail on actionable regressions; disable only for exploratory runs'
        required: false
        default: true
        type: boolean
      profile:
        description: 'Capture per-iteration BIFROST_TIMING traces'
        required: false
        default: false
        type: boolean
      post_to_slack:
        description: 'Post results to Slack; disable for exploratory runs'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      SLACK_DAILY_PERF_WEBHOOK_URL: ${{ secrets.SLACK_DAILY_PERF_WEBHOOK_URL }}
      BENCHMARK_REPO: ${{ inputs.repo || '' }}
      BENCHMARK_MAX_FILES: ${{ inputs.max_files || '' }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Cache benchmark repos
        uses: actions/cache@v6
        with:
          path: benchmark/.cache/repos
          key: benchmark-repos-${{ runner.os }}-${{ hashFiles('benchmark/targets.toml') }}
          restore-keys: |
            benchmark-repos-${{ runner.os }}-

      - name: Build benchmark binaries
        run: cargo build --locked --bin bifrost --bin bifrost_benchmark

      - name: Validate benchmark manifest
        run: ./target/debug/bifrost_benchmark validate --manifest benchmark/targets.toml

      - name: Run benchmark harness
        id: run_benchmark
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p benchmark/benchmark-output
          args=(run --manifest benchmark/targets.toml --output benchmark-output)
          if [ -n "$BENCHMARK_REPO" ]; then
            args+=(--repo "$BENCHMARK_REPO")
          fi
          if [ -n "$BENCHMARK_MAX_FILES" ]; then
            args+=(--max-files "$BENCHMARK_MAX_FILES")
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.profile }}" = "true" ]; then
            args+=(--profile)
          fi
          BIFROST_BENCHMARK_BIFROST_BIN=./target/debug/bifrost \
            ./target/debug/bifrost_benchmark "${args[@]}"

      - name: Resolve benchmark paths
        id: paths
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          report_path=""
          if compgen -G "benchmark/benchmark-output/run-*.json" > /dev/null; then
            report_path="$(ls -t benchmark/benchmark-output/run-*.json | head -n1)"
          fi
          echo "report_path=${report_path}" >> "$GITHUB_OUTPUT"
          echo "baseline_path=benchmark/baselines/ubuntu-latest.json" >> "$GITHUB_OUTPUT"
          echo "compare_path=benchmark/benchmark-output/compare-${GITHUB_RUN_ID}.json" >> "$GITHUB_OUTPUT"
          echo "compare_summary_path=benchmark/benchmark-output/compare-summary.txt" >> "$GITHUB_OUTPUT"
          effective_strict_compare="true"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            effective_strict_compare="${{ inputs.strict_compare }}"
          fi
          echo "effective_strict_compare=${effective_strict_compare}" >> "$GITHUB_OUTPUT"

      - name: Compare against blessed baseline
        id: compare
        if: always() && env.BENCHMARK_MAX_FILES == '' && steps.paths.outputs.report_path != '' && hashFiles('benchmark/baselines/ubuntu-latest.json') != ''
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          args=(
            compare
            --baseline "${{ steps.paths.outputs.baseline_path }}"
            --candidate "${{ steps.paths.outputs.report_path }}"
            --output "${{ steps.paths.outputs.compare_path }}"
          )
          if [ "${{ steps.paths.outputs.effective_strict_compare }}" = "true" ]; then
            args+=(--strict)
          fi
          ./target/debug/bifrost_benchmark "${args[@]}" | tee "${{ steps.paths.outputs.compare_summary_path }}"

      - name: Note missing baseline
        if: always() && steps.paths.outputs.report_path != '' && hashFiles('benchmark/baselines/ubuntu-latest.json') == ''
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "No blessed ubuntu-latest baseline is checked in yet."
            echo "Promote a reviewed report artifact to benchmark/baselines/ubuntu-latest.json to enable compare."
          } | tee "${{ steps.paths.outputs.compare_summary_path }}"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-${{ github.run_id }}
          path: benchmark/benchmark-output
          if-no-files-found: warn
          retention-days: 14

      - name: Publish benchmark summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "# Benchmark Harness"
            echo
            echo "- Run step: ${{ steps.run_benchmark.outcome }}"
            if [ -n "${{ steps.paths.outputs.report_path }}" ]; then
              echo "- Report: \`${{ steps.paths.outputs.report_path }}\`"
            else
              echo "- Report: none written"
            fi
            if [ -f "${{ steps.paths.outputs.compare_path }}" ]; then
              echo "- Compare JSON: \`${{ steps.paths.outputs.compare_path }}\`"
            fi
            if [ -f "${{ steps.paths.outputs.compare_summary_path }}" ]; then
              echo
              echo "## Compare"
              echo
              cat "${{ steps.paths.outputs.compare_summary_path }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare Slack payload
        id: slack_payload
        if: always() && env.SLACK_DAILY_PERF_WEBHOOK_URL != '' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.post_to_slack))
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          run_outcome="${{ steps.run_benchmark.outcome }}"
          compare_outcome="${{ steps.compare.outcome }}"
          if [ -z "$compare_outcome" ]; then
            compare_outcome="skipped"
          fi

          report_path="${{ steps.paths.outputs.report_path }}"
          compare_path="${{ steps.paths.outputs.compare_path }}"
          compare_summary_path="${{ steps.paths.outputs.compare_summary_path }}"

          generated_at=""
          base_sha_short=""
          selected_repo=""
          report_max_files="null"
          repo_count="0"
          failed_scenarios_count="0"
          baseline_path="${{ steps.paths.outputs.baseline_path }}"
          if [ -f "$baseline_path" ]; then
            base_sha_short="$(jq -r '.bifrost_commit // ""' "$baseline_path" | cut -c1-7)"
          fi
          if [ -n "$report_path" ] && [ -f "$report_path" ]; then
            generated_at="$(jq -r '.generated_at // ""' "$report_path")"
            selected_repo="$(jq -r '.selected_repo // ""' "$report_path")"
            report_max_files="$(jq -c '.max_files // null' "$report_path")"
            repo_count="$(jq -r '.repos | length' "$report_path")"
            failed_scenarios_count="$(jq -r '[.repos[].scenarios[] | select(.success == false)] | length' "$report_path")"
          fi

          compared_scenarios_count="0"
          regression_count="0"
          actionable_regression_count="0"
          improvement_count="0"
          missing_candidate_count="0"
          new_candidate_count="0"
          has_regressions="false"
          has_actionable_regressions="false"
          environment_variance_detected="false"
          environment_variance_detail=""
          environment_variance_covered_regression_count="0"
          environment_variance_workspace_build_regression_count="0"
          if [ -f "$compare_path" ]; then
            compared_scenarios_count="$(jq -r '.compared_scenarios_count // 0' "$compare_path")"
            regression_count="$(jq -r '.regression_count // 0' "$compare_path")"
            actionable_regression_count="$(jq -r '.actionable_regression_count // .regression_count // 0' "$compare_path")"
            improvement_count="$(jq -r '.improvement_count // 0' "$compare_path")"
            missing_candidate_count="$(jq -r '.missing_candidate_count // 0' "$compare_path")"
            new_candidate_count="$(jq -r '.new_candidate_count // 0' "$compare_path")"
            has_regressions="$(jq -r '.has_regressions // false' "$compare_path")"
            has_actionable_regressions="$(jq -r '.has_actionable_regressions // .has_regressions // false' "$compare_path")"
            environment_variance_detected="$(jq -r '(.environment_variance // null) != null' "$compare_path")"
            environment_variance_detail="$(jq -r '.environment_variance.detail // ""' "$compare_path")"
            environment_variance_covered_regression_count="$(jq -r '.environment_variance.covered_regression_count // 0' "$compare_path")"
            environment_variance_workspace_build_regression_count="$(jq -r '.environment_variance.workspace_build_regression_count // 0' "$compare_path")"
          fi

          summary_text=""
          if [ -f "$compare_summary_path" ]; then
            summary_text="$(cat "$compare_summary_path")"
          fi

          strict_compare="${{ steps.paths.outputs.effective_strict_compare }}"

          ok="true"
          error_text=""
          if [ "$run_outcome" != "success" ]; then
            ok="false"
            error_text="benchmark run failed"
          elif [ "$failed_scenarios_count" != "0" ]; then
            ok="false"
            error_text="benchmark report recorded scenario failures"
          elif [ "$has_actionable_regressions" = "true" ]; then
            ok="false"
            error_text="benchmark compare detected regressions"
          elif [ "$compare_outcome" = "failure" ]; then
            ok="false"
            error_text="benchmark compare failed"
          fi

          head_sha_short="$(git rev-parse --short "$GITHUB_SHA")"

          payload="$(
            jq -nc \
              --arg error_text "$error_text" \
              --arg workflow_run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg head_sha_short "$head_sha_short" \
              --arg base_sha_short "$base_sha_short" \
              --arg event_name "${{ github.event_name }}" \
              --arg repo_input "$BENCHMARK_REPO" \
              --arg max_files_input "$BENCHMARK_MAX_FILES" \
              --arg run_outcome "$run_outcome" \
              --arg compare_outcome "$compare_outcome" \
              --arg report_path "$report_path" \
              --arg compare_path "$compare_path" \
              --arg compare_summary_path "$compare_summary_path" \
              --arg generated_at "$generated_at" \
              --arg selected_repo "$selected_repo" \
              --arg environment_variance_detail "$environment_variance_detail" \
              --arg summary_text "$summary_text" \
              --argjson ok "$ok" \
              --argjson strict_compare "$strict_compare" \
              --argjson report_max_files "$report_max_files" \
              --argjson repo_count "$repo_count" \
              --argjson failed_scenarios_count "$failed_scenarios_count" \
              --argjson compared_scenarios_count "$compared_scenarios_count" \
              --argjson regression_count "$regression_count" \
              --argjson actionable_regression_count "$actionable_regression_count" \
              --argjson improvement_count "$improvement_count" \
              --argjson missing_candidate_count "$missing_candidate_count" \
              --argjson new_candidate_count "$new_candidate_count" \
              --argjson has_regressions "$has_regressions" \
              --argjson has_actionable_regressions "$has_actionable_regressions" \
              --argjson environment_variance_detected "$environment_variance_detected" \
              --argjson environment_variance_covered_regression_count "$environment_variance_covered_regression_count" \
              --argjson environment_variance_workspace_build_regression_count "$environment_variance_workspace_build_regression_count" \
              '{
                ok: $ok,
                error_text: $error_text,
                workflow_run_url: $workflow_run_url,
                head_sha_short: $head_sha_short,
                base_sha_short: $base_sha_short,
                event_name: $event_name,
                repo_input: $repo_input,
                max_files_input: $max_files_input,
                strict_compare: $strict_compare,
                run_outcome: $run_outcome,
                compare_outcome: $compare_outcome,
                report_path: $report_path,
                compare_path: $compare_path,
                compare_summary_path: $compare_summary_path,
                generated_at: $generated_at,
                selected_repo: $selected_repo,
                report_max_files: $report_max_files,
                repo_count: $repo_count,
                failed_scenarios_count: $failed_scenarios_count,
                compared_scenarios_count: $compared_scenarios_count,
                regression_count: $regression_count,
                actionable_regression_count: $actionable_regression_count,
                improvement_count: $improvement_count,
                missing_candidate_count: $missing_candidate_count,
                new_candidate_count: $new_candidate_count,
                has_regressions: $has_regressions,
                has_actionable_regressions: $has_actionable_regressions,
                environment_variance_detected: $environment_variance_detected,
                environment_variance_detail: $environment_variance_detail,
                environment_variance_covered_regression_count: $environment_variance_covered_regression_count,
                environment_variance_workspace_build_regression_count: $environment_variance_workspace_build_regression_count,
                summary_text: $summary_text
              }'
          )"

          {
            echo 'payload<<EOF'
            echo "$payload"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Send benchmark data to Slack Workflow
        if: always() && env.SLACK_DAILY_PERF_WEBHOOK_URL != '' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.post_to_slack)) && steps.slack_payload.outputs.payload != ''
        continue-on-error: true
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ env.SLACK_DAILY_PERF_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: ${{ steps.slack_payload.outputs.payload }}

      - name: Enforce benchmark outcome
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.run_benchmark.outcome }}" != "success" ]; then
            echo "benchmark run failed" >&2
            exit 1
          fi
          if [ "${{ steps.compare.outcome }}" = "failure" ]; then
            echo "benchmark compare reported regressions in strict mode" >&2
            exit 1
          fi
