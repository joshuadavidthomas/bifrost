name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v0.1.0)'
        required: true
        type: string

env:
  BIN_NAME: bifrost
  ANDROID_API: '21'

jobs:
  notices:
    name: generate Rust notices
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Install pinned cargo-about
        run: cargo install --locked cargo-about --version 0.9.1 --features cli

      - name: Generate Rust notice report
        run: scripts/generate-rust-third-party-notices.sh dist/THIRD_PARTY_LICENSES.html

      - name: Upload Rust notice report
        uses: actions/upload-artifact@v6
        with:
          name: rust-third-party-licenses
          path: dist/THIRD_PARTY_LICENSES.html
          if-no-files-found: error

  build:
    name: build (${{ matrix.target }})
    needs: notices
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            rust_targets: "x86_64-unknown-linux-gnu"
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            rust_targets: "x86_64-unknown-linux-musl"
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            rust_targets: "aarch64-unknown-linux-gnu"
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: aarch64-linux-android
            rust_targets: "aarch64-linux-android"
            runner: ubuntu-latest
            archive: tar.gz
          - target: universal-apple-darwin
            rust_targets: "x86_64-apple-darwin aarch64-apple-darwin"
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            rust_targets: "x86_64-pc-windows-msvc"
            runner: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            rust_targets: "aarch64-pc-windows-msvc"
            runner: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: scripts/resolve-release-tag.sh

      - name: Download Rust notice report
        uses: actions/download-artifact@v7
        with:
          name: rust-third-party-licenses
          path: licenses

      - name: Install Rust toolchain
        shell: bash
        run: rustup show

      - name: Install Rust targets
        shell: bash
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y musl-tools

      - name: Set up Android NDK
        if: matrix.target == 'aarch64-linux-android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
          add-to-path: false

      - name: Configure Android toolchain
        if: matrix.target == 'aarch64-linux-android'
        shell: bash
        run: |
          toolchain_bin="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          api="${ANDROID_API}"
          {
            echo "CC_aarch64_linux_android=${toolchain_bin}/aarch64-linux-android${api}-clang"
            echo "CXX_aarch64_linux_android=${toolchain_bin}/aarch64-linux-android${api}-clang++"
            echo "AR_aarch64_linux_android=${toolchain_bin}/llvm-ar"
            echo "RANLIB_aarch64_linux_android=${toolchain_bin}/llvm-ranlib"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${toolchain_bin}/aarch64-linux-android${api}-clang"
          } >> "$GITHUB_ENV"

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        if: matrix.target != 'universal-apple-darwin'
        run: cargo build --release --locked --bin ${{ env.BIN_NAME }} --target ${{ matrix.target }}

      - name: Build macOS universal binary
        if: matrix.target == 'universal-apple-darwin'
        shell: bash
        run: |
          cargo build --release --locked --bin "${BIN_NAME}" --target x86_64-apple-darwin
          cargo build --release --locked --bin "${BIN_NAME}" --target aarch64-apple-darwin
          mkdir -p "target/${{ matrix.target }}/release"
          lipo -create \
            "target/x86_64-apple-darwin/release/${BIN_NAME}" \
            "target/aarch64-apple-darwin/release/${BIN_NAME}" \
            -output "target/${{ matrix.target }}/release/${BIN_NAME}"
          lipo -info "target/${{ matrix.target }}/release/${BIN_NAME}"

      - name: Stage artifacts (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          stage="${BIN_NAME}-${{ steps.tag.outputs.name }}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${stage}/"
          cp LICENSE.md README.md licenses/GPL-3.0.md licenses/SOURCE.md licenses/THIRD_PARTY_LICENSES.html licenses/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt "dist/${stage}/"
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          (cd dist && shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256")

      - name: Stage artifacts (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "${env:BIN_NAME}-${{ steps.tag.outputs.name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$stage" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" "dist/$stage/"
          Copy-Item LICENSE.md, README.md, licenses/GPL-3.0.md, licenses/SOURCE.md, licenses/THIRD_PARTY_LICENSES.html, licenses/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt "dist/$stage/"
          Compress-Archive -Path "dist/$stage" -DestinationPath "dist/$stage.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$stage.zip").Hash.ToLower()
          "$hash  $stage.zip" | Out-File -Encoding ascii "dist/$stage.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: scripts/resolve-release-tag.sh

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

      - name: Announce release on Discord
        continue-on-error: true
        env:
          DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.name }}
        shell: bash
        run: bash scripts/announce-discord-release.sh

  vscode:
    name: vscode extension
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: scripts/resolve-release-tag.sh

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: editors/vscode

      - name: Prepare extension manifest
        run: >
          node scripts/prepare-vscode-extension-manifest.mjs
          --version "${{ steps.tag.outputs.version }}"
          --manifest editors/vscode/package.json
          --plugin-release plugins/bifrost-agent/bifrost-release.json
          --dist dist

      - name: Generate Amp skill bundle
        run: node scripts/generate-amp-skill-bundle.mjs

      - name: Test agent plugin launcher
        run: node --test plugins/bifrost-agent/test/launcher.test.mjs

      - name: Validate agent plugin manifests
        run: node scripts/check-codex-plugin-manifest.mjs

      - name: Test extension
        run: npm test
        working-directory: editors/vscode

      - name: Package extension
        run: npx --no-install vsce package --out "../../dist/bifrost-vscode-${{ steps.tag.outputs.name }}.vsix"
        working-directory: editors/vscode

      - name: Package agent plugin
        shell: bash
        run: |
          cp -R plugins/bifrost-agent "${RUNNER_TEMP}/bifrost-agent"
          cp LICENSE.md licenses/GPL-3.0.md licenses/SOURCE.md "${RUNNER_TEMP}/bifrost-agent/"
          tar -C "${RUNNER_TEMP}" -czf "dist/bifrost-agent-${{ steps.tag.outputs.name }}.tar.gz" bifrost-agent

      - name: Upload editor and agent plugin artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            dist/*.vsix
            dist/bifrost-agent-*.tar.gz

      - name: Publish extension to Visual Studio Marketplace
        run: >
          npx --no-install vsce publish
          --packagePath "../../dist/bifrost-vscode-${{ steps.tag.outputs.name }}.vsix"
        working-directory: editors/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
