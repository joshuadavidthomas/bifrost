name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v0.1.0)'
        required: true
        type: string

env:
  BIN_NAME: bifrost
  ANDROID_API: '21'

jobs:
  notices:
    name: generate Rust notices
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Install pinned cargo-about
        run: cargo install --locked cargo-about --version 0.9.1 --features cli

      - name: Fetch locked dependencies for offline notice report
        run: cargo fetch --locked

      - name: Generate Rust notice report
        run: scripts/generate-rust-third-party-notices.sh dist/THIRD_PARTY_LICENSES.html

      - name: Upload Rust notice report
        uses: actions/upload-artifact@v6
        with:
          name: rust-third-party-licenses
          path: dist/THIRD_PARTY_LICENSES.html
          if-no-files-found: error

  build:
    name: build (${{ matrix.target }})
    needs: notices
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            rust_targets: "x86_64-unknown-linux-gnu"
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            rust_targets: "x86_64-unknown-linux-musl"
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            rust_targets: "aarch64-unknown-linux-gnu"
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: aarch64-linux-android
            rust_targets: "aarch64-linux-android"
            runner: ubuntu-latest
            archive: tar.gz
          - target: universal-apple-darwin
            rust_targets: "x86_64-apple-darwin aarch64-apple-darwin"
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            rust_targets: "x86_64-pc-windows-msvc"
            runner: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            rust_targets: "aarch64-pc-windows-msvc"
            runner: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: scripts/resolve-release-tag.sh

      - name: Download Rust notice report
        uses: actions/download-artifact@v7
        with:
          name: rust-third-party-licenses
          path: licenses

      - name: Install Rust toolchain
        shell: bash
        run: rustup show

      - name: Install Rust targets
        shell: bash
        run: rustup target add ${{ matrix.rust_targets }}

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y musl-tools

      - name: Set up Android NDK
        if: matrix.target == 'aarch64-linux-android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
          add-to-path: false

      - name: Configure Android toolchain
        if: matrix.target == 'aarch64-linux-android'
        shell: bash
        run: |
          toolchain_bin="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          api="${ANDROID_API}"
          {
            echo "CC_aarch64_linux_android=${toolchain_bin}/aarch64-linux-android${api}-clang"
            echo "CXX_aarch64_linux_android=${toolchain_bin}/aarch64-linux-android${api}-clang++"
            echo "AR_aarch64_linux_android=${toolchain_bin}/llvm-ar"
            echo "RANLIB_aarch64_linux_android=${toolchain_bin}/llvm-ranlib"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${toolchain_bin}/aarch64-linux-android${api}-clang"
          } >> "$GITHUB_ENV"

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        if: matrix.target != 'universal-apple-darwin'
        run: cargo build --release --locked --bin ${{ env.BIN_NAME }} --target ${{ matrix.target }}

      - name: Build macOS universal binary
        if: matrix.target == 'universal-apple-darwin'
        shell: bash
        run: |
          cargo build --release --locked --bin "${BIN_NAME}" --target x86_64-apple-darwin
          cargo build --release --locked --bin "${BIN_NAME}" --target aarch64-apple-darwin
          mkdir -p "target/${{ matrix.target }}/release"
          lipo -create \
            "target/x86_64-apple-darwin/release/${BIN_NAME}" \
            "target/aarch64-apple-darwin/release/${BIN_NAME}" \
            -output "target/${{ matrix.target }}/release/${BIN_NAME}"
          lipo -info "target/${{ matrix.target }}/release/${BIN_NAME}"

      - name: Stage artifacts (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          stage="${BIN_NAME}-${{ steps.tag.outputs.name }}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${stage}/"
          cp LICENSE.md README.md licenses/GPL-3.0.md licenses/SOURCE.md licenses/THIRD_PARTY_LICENSES.html licenses/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt "dist/${stage}/"
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          (cd dist && shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256")

      - name: Stage artifacts (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "${env:BIN_NAME}-${{ steps.tag.outputs.name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$stage" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" "dist/$stage/"
          Copy-Item LICENSE.md, README.md, licenses/GPL-3.0.md, licenses/SOURCE.md, licenses/THIRD_PARTY_LICENSES.html, licenses/SUPPLEMENTAL_THIRD_PARTY_NOTICES.txt "dist/$stage/"
          Compress-Archive -Path "dist/$stage" -DestinationPath "dist/$stage.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$stage.zip").Hash.ToLower()
          "$hash  $stage.zip" | Out-File -Encoding ascii "dist/$stage.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  agent-plugin-package:
    name: stage agent plugin package
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: scripts/resolve-release-tag.sh

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Prepare agent plugin release metadata
        run: >
          node scripts/prepare-vscode-extension-manifest.mjs
          --version "${{ steps.tag.outputs.version }}"
          --plugin-release plugins/bifrost-agent/bifrost-release.json
          --dist dist

      - name: Generate Amp skill bundle
        run: node scripts/generate-amp-skill-bundle.mjs

      - name: Test agent plugin launcher
        run: node --test plugins/bifrost-agent/test/launcher.test.mjs

      - name: Validate agent plugin manifests
        run: node scripts/check-codex-plugin-manifest.mjs

      - name: Package agent plugin
        shell: bash
        run: |
          package_root="${RUNNER_TEMP}/bifrost-agent-package"
          mkdir -p "$package_root" dist
          cp -R plugins/bifrost-agent "$package_root/bifrost-agent"
          cp LICENSE.md licenses/GPL-3.0.md licenses/SOURCE.md "$package_root/bifrost-agent/"
          tar -C "$package_root" -czf "dist/bifrost-agent-${{ steps.tag.outputs.name }}.tar.gz" bifrost-agent

      - name: Upload staged agent plugin
        uses: actions/upload-artifact@v6
        with:
          name: bifrost-agent-package
          path: dist/bifrost-agent-${{ steps.tag.outputs.name }}.tar.gz
          if-no-files-found: error

  agent-plugin-prepublish-smoke:
    name: prepublication agent plugin smoke
    needs: [build, agent-plugin-package]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download built Linux binary
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.BIN_NAME }}-x86_64-unknown-linux-gnu
          path: ${{ runner.temp }}/bifrost-linux-release

      - name: Download staged agent plugin
        uses: actions/download-artifact@v7
        with:
          name: bifrost-agent-package
          path: ${{ runner.temp }}/bifrost-agent-prepublish

      - name: Extract staged agent plugin
        shell: bash
        run: |
          package_dir="${RUNNER_TEMP}/bifrost-agent-prepublish"
          archive="$(find "$package_dir" -maxdepth 1 -type f -name 'bifrost-agent-*.tar.gz' -print -quit)"
          test -n "$archive"
          tar -C "$package_dir" -xzf "$archive"

      - name: Extract built Linux binary
        id: binary
        shell: bash
        env:
          ARTIFACT_DIR: ${{ runner.temp }}/bifrost-linux-release
        run: |
          archive="$(find "$ARTIFACT_DIR" -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          test -n "$archive"
          tar -C "$ARTIFACT_DIR" -xzf "$archive"
          binary="$(find "$ARTIFACT_DIR" -type f -name "${BIN_NAME}" -print -quit)"
          test -n "$binary"
          chmod +x "$binary"
          echo "path=$binary" >> "$GITHUB_OUTPUT"

      - name: Smoke staged agent plugin with built binary
        shell: bash
        run: >
          node scripts/smoke-agent-plugin-release.mjs
          --plugin-dir "${RUNNER_TEMP}/bifrost-agent-prepublish/bifrost-agent"
          --cache-dir "${RUNNER_TEMP}/bifrost-agent-prepublish-cache"
          --binary-path "${{ steps.binary.outputs.path }}"

  release:
    name: release
    needs: [build, agent-plugin-prepublish-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: scripts/resolve-release-tag.sh

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/${{ env.BIN_NAME }}-${{ steps.tag.outputs.name }}-*.tar.gz
            dist/${{ env.BIN_NAME }}-${{ steps.tag.outputs.name }}-*.zip
            dist/${{ env.BIN_NAME }}-${{ steps.tag.outputs.name }}-*.sha256

  pi-package:
    name: Pi package
    needs: [release, publish-agent-plugin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: scripts/resolve-release-tag.sh

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugins/bifrost-agent/package-lock.json

      - name: Install Pi package dependencies
        run: npm ci
        working-directory: plugins/bifrost-agent

      - name: Prepare Pi release metadata
        run: >
          node scripts/prepare-vscode-extension-manifest.mjs
          --version "${{ steps.tag.outputs.version }}"
          --plugin-release plugins/bifrost-agent/bifrost-release.json
          --dist dist

      - name: Test Pi package
        run: npm test
        working-directory: plugins/bifrost-agent

      - name: Check Pi package
        run: npm run check
        working-directory: plugins/bifrost-agent

      - name: Test packed Pi package install
        run: npm run test:packed
        working-directory: plugins/bifrost-agent

      - name: Package Pi package
        run: npm pack --pack-destination ../../dist
        working-directory: plugins/bifrost-agent

      - name: Upload Pi package artifact to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: dist/brokk-bifrost-agent-*.tgz

  vscode:
    name: vscode extension
    needs: [release, publish-agent-plugin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: scripts/resolve-release-tag.sh

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: editors/vscode

      - name: Prepare extension manifest
        run: >
          node scripts/prepare-vscode-extension-manifest.mjs
          --version "${{ steps.tag.outputs.version }}"
          --manifest editors/vscode/package.json
          --plugin-release plugins/bifrost-agent/bifrost-release.json
          --dist dist

      - name: Generate Amp skill bundle
        run: node scripts/generate-amp-skill-bundle.mjs

      - name: Test agent plugin launcher
        run: node --test plugins/bifrost-agent/test/launcher.test.mjs

      - name: Validate agent plugin manifests
        run: node scripts/check-codex-plugin-manifest.mjs

      - name: Test extension
        run: npm test
        working-directory: editors/vscode

      - name: Package extension
        run: npx --no-install vsce package --out "../../dist/bifrost-vscode-${{ steps.tag.outputs.name }}.vsix"
        working-directory: editors/vscode

      - name: Upload editor artifact to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: dist/*.vsix

      - name: Publish extension to Visual Studio Marketplace
        run: >
          npx --no-install vsce publish
          --packagePath "../../dist/bifrost-vscode-${{ steps.tag.outputs.name }}.vsix"
        working-directory: editors/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  agent-plugin-release-smoke:
    name: packaged agent plugin smoke
    needs: release
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout release scripts
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: scripts/resolve-release-tag.sh

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download staged agent plugin
        uses: actions/download-artifact@v7
        with:
          name: bifrost-agent-package
          path: ${{ runner.temp }}/bifrost-agent-release

      - name: Extract staged agent plugin
        shell: bash
        run: >
          tar -C "${RUNNER_TEMP}/bifrost-agent-release"
          -xzf "${RUNNER_TEMP}/bifrost-agent-release/bifrost-agent-${{ steps.tag.outputs.name }}.tar.gz"

      - name: Smoke packaged launcher and MCP
        shell: bash
        run: >
          node scripts/smoke-agent-plugin-release.mjs
          --plugin-dir "${RUNNER_TEMP}/bifrost-agent-release/bifrost-agent"
          --cache-dir "${RUNNER_TEMP}/bifrost-agent-cold-cache"

  publish-agent-plugin:
    name: publish validated agent plugin
    needs: [release, agent-plugin-release-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release scripts
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: scripts/resolve-release-tag.sh

      - name: Download validated agent plugin
        uses: actions/download-artifact@v7
        with:
          name: bifrost-agent-package
          path: dist

      - name: Upload agent plugin to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: dist/bifrost-agent-${{ steps.tag.outputs.name }}.tar.gz

      - name: Announce release on Discord
        continue-on-error: true
        env:
          DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.name }}
        shell: bash
        run: bash scripts/announce-discord-release.sh

  sync-agent-plugin-release-metadata:
    name: sync generated release metadata
    needs: [vscode, agent-plugin-release-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release-metadata-master
      cancel-in-progress: false
    steps:
      - name: Checkout master
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Resolve tag
        id: tag
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: scripts/resolve-release-tag.sh

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Confirm master is the released version
        run: node scripts/check-release-version.mjs "${{ steps.tag.outputs.version }}"

      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Prepare generated release metadata
        run: >
          node scripts/prepare-vscode-extension-manifest.mjs
          --version "${{ steps.tag.outputs.version }}"
          --manifest editors/vscode/package.json
          --plugin-release plugins/bifrost-agent/bifrost-release.json
          --dist dist

      - name: Regenerate Amp skill bundle
        run: node scripts/generate-amp-skill-bundle.mjs

      - name: Validate synchronized release projections
        run: node scripts/sync-release-version.mjs --check

      - name: Validate agent plugin manifests
        run: node scripts/check-codex-plugin-manifest.mjs

      - name: Reject non-metadata generated changes
        shell: bash
        run: |
          allowed_canonical="plugins/bifrost-agent/bifrost-release.json"
          allowed_amp="plugins/bifrost-agent/amp-skills/bifrost-code-intelligence/bifrost-release.json"
          allowed_vscode="editors/vscode/package.json"
          while IFS= read -r changed_file; do
            [ -z "$changed_file" ] && continue
            if [ "$changed_file" != "$allowed_canonical" ] && \
              [ "$changed_file" != "$allowed_amp" ] && \
              [ "$changed_file" != "$allowed_vscode" ]; then
              echo "Refusing to commit unexpected generated change: $changed_file" >&2
              exit 1
            fi
          done < <(git diff --name-only)

      - name: Commit generated metadata
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Generated agent plugin metadata is already current."
            exit 0
          fi
          git add -- plugins/bifrost-agent/bifrost-release.json \
            plugins/bifrost-agent/amp-skills/bifrost-code-intelligence/bifrost-release.json \
            editors/vscode/package.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync release metadata for ${{ steps.tag.outputs.name }}"
          git push origin HEAD:master
